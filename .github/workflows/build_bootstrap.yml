name: Build Custom Bootstrap Archives

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Android Package Name'
        required: true
        default: 'com.hostcraft.android'


permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64]
      fail-fast: false
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Clone termux-packages
        run: |
          git clone --depth 1 https://github.com/termux/termux-packages.git termux-packages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Patch termux-packages source paths
        run: |
          python3 patch_prefix.py termux-packages "${{ github.event.inputs.package_name || 'com.hostcraft.android' }}"

      - name: Build bootstrap packages
        run: |
          cd termux-packages
          # Build core bootstrap packages for the target architecture
          # -I: Install dependencies, -C: Clean build directory
          ./scripts/run-docker.sh ./build-package.sh -a ${{ matrix.arch }} -I -C bash apt dpkg coreutils tar grep sed gzip xz-utils curl termux-tools termux-exec

      - name: Set up local APT repository
        run: |
          cd termux-packages
          # Create repository directories
          mkdir -p repo/dists/stable/main/binary-${{ matrix.arch }}
          mkdir -p repo/dists/stable/main/binary-all
          
          # Copy compiled debs
          cp output/*.deb repo/dists/stable/main/binary-${{ matrix.arch }}/ || true
          
          # Generate Packages index
          cd repo/dists/stable/main/binary-${{ matrix.arch }}
          dpkg-scanpackages . /dev/null > Packages
          bzip2 -k Packages
          
          # Generate Packages index for 'all' arch
          cd ../binary-all
          touch Packages
          bzip2 -k Packages

      - name: Generate bootstrap archive
        run: |
          cd termux-packages
          # Start a local HTTP server to serve the APT repository
          python3 -m http.server 8080 --directory repo &
          SERVER_PID=$!
          sleep 3
          
          # Run the generate-bootstraps script pointing to our local repository
          ./scripts/generate-bootstraps.sh --architectures ${{ matrix.arch }} --repository http://localhost:8080/dists/stable/main
          
          # Kill the local server
          kill $SERVER_PID

      - name: Upload bootstrap zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: termux-packages/bootstrap-*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
    steps:
      - name: Download all bootstrap artifacts
        uses: actions/download-artifact@v4
        with:
          path: bootstraps
          merge-multiple: true

      - name: Get current date for version tag
        id: get_version
        run: |
          echo "version=bootstrap-$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Custom Bootstrap Release ${{ steps.get_version.outputs.version }}
          body: |
            Automatically compiled custom bootstrap packages for Termux environment.
            
            Compiled prefix: `/data/data/${{ github.event.inputs.package_name || 'com.hostcraft.android' }}/files/usr`
          files: bootstraps/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
