name: Build Custom Bootstrap Archives

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 */5 * *'
  workflow_dispatch:
    inputs:
      package_name:
        description: 'Target Android Package Name'
        required: true
        default: 'com.hostcraft.android'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        arch: [aarch64, arm, x86_64]
      fail-fast: false
    steps:
      - name: Checkout builder repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq curl jq xz-utils zip

      - name: Clone termux-packages
        run: |
          git clone --depth 1 https://github.com/termux/termux-packages.git termux-packages

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Generate bootstrap archive (from official Termux repo)
        run: |
          cd termux-packages
          python3 -c '
          import re, sys
          with open("scripts/generate-bootstraps.sh", "r") as f:
              code = f.read()
          pattern = r"# Package manager\..*?pull_package unzip"
          replacement = """# Minimal packages for HostCraft Minecraft Server
          \tpull_package bash
          \tpull_package coreutils
          \tpull_package tar
          \tpull_package xz-utils
          \tpull_package libandroid-shmem
          \tpull_package libandroid-spawn
          \tpull_package libiconv
          \tpull_package libjpeg-turbo
          \tpull_package littlecms"""
          modified_code, count = re.subn(pattern, replacement, code, flags=re.DOTALL)
          if count == 0:
              print("Error: Could not find package list block in generate-bootstraps.sh")
              sys.exit(1)
          second_stage_pattern = r"add_termux_bootstrap_second_stage_files \"\$package_arch\""
          second_stage_replacement = "# add_termux_bootstrap_second_stage_files \"$package_arch\""
          modified_code, sec_count = re.subn(second_stage_pattern, second_stage_replacement, modified_code)
          with open("scripts/generate-bootstraps.sh", "w") as f:
              f.write(modified_code)
          print(f"Successfully patched generate-bootstraps.sh (packages={count}, second_stage={sec_count})")
          '
          ./scripts/generate-bootstraps.sh --architectures ${{ matrix.arch }}

      - name: Post-process bootstrap (replace com.termux)
        run: |
          PACKAGE_NAME="${{ github.event.inputs.package_name || 'com.hostcraft.android' }}"
          ARCH="${{ matrix.arch }}"

          cd termux-packages

          # Unzip the bootstrap
          mkdir -p bootstrap-extracted
          cd bootstrap-extracted
          unzip -o ../bootstrap-${ARCH}.zip

          # Run the patch script on the extracted content
          cd ..
          python3 ../patch_prefix.py bootstrap-extracted "$PACKAGE_NAME"

          # Also patch SYMLINKS.txt if it exists
          if [ -f bootstrap-extracted/SYMLINKS.txt ]; then
            sed -i "s|com.termux|${PACKAGE_NAME}|g" bootstrap-extracted/SYMLINKS.txt
            echo "[+] Patched SYMLINKS.txt"
          fi

          # Re-zip the bootstrap
          rm -f bootstrap-${ARCH}.zip
          cd bootstrap-extracted
          zip -r9 ../bootstrap-${ARCH}.zip ./*
          cd ..
          rm -rf bootstrap-extracted

          echo "[*] Re-packaged bootstrap-${ARCH}.zip with prefix: ${PACKAGE_NAME}"

      - name: Upload bootstrap zip as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bootstrap-${{ matrix.arch }}
          path: termux-packages/bootstrap-*.zip

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    steps:
      - name: Download all bootstrap artifacts
        uses: actions/download-artifact@v4
        with:
          path: bootstraps
          merge-multiple: true

      - name: Get current date for version tag
        id: get_version
        run: |
          echo "version=bootstrap-$(date '+%Y.%m.%d-%H%M')" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Custom Bootstrap Release ${{ steps.get_version.outputs.version }}
          body: |
            Custom bootstrap archives with patched prefix for HostCraft.

            Patched prefix: `/data/data/${{ github.event.inputs.package_name || 'com.hostcraft.android' }}/files/usr`
            ELF binaries retain original hardcoded paths (handled at runtime by the app).
          files: bootstraps/*.zip